# deploy/config.toml — ECS app deployment configuration
#
# This file is the canonical reference for every directive supported by
# `ops ecs deploy`. Copy it into your app directory:
#
#   Mono-repo:    apps/{app}/deploy/config.toml
#   Single-repo:  deploy/config.toml
#
# Config resolution: base defaults (from .ops/config.yaml [ecs.defaults])
# are applied first, then [global] overlays them, then the target env section
# overlays global. Any field not set in a section inherits from the layer below.
#
# All fields are optional unless noted as REQUIRED.
#
# TOML SUBTABLE SCOPING — READ THIS BEFORE EDITING
# -------------------------------------------------
# In TOML, once a [section.subtable] header appears, every bare key/value that
# follows belongs to that subtable until the next [header] arrives. This means:
#
#   [global.environment]      # opens the subtable
#   NODE_ENV = "production"   # belongs to global.environment ✓
#   secrets = ["API_KEY"]     # WRONG — this belongs to global.environment, not global!
#
# To avoid the trap, put every top-level scalar (secrets, build_secrets, etc.)
# ABOVE all [section.subtable] headers, or use the dedicated map form such as
# [global.secrets] and [global.build_secrets] which are their own headers.

# ---------------------------------------------------------------------------
# [global] — applied to every environment
# ---------------------------------------------------------------------------
# Only multi-write-safe volume types (efs) may be declared here.
# All other fields can be overridden freely by env-specific sections.
[global]

# REQUIRED. Unique name for this app. Drives the ECS family, service name,
# CloudWatch log group, container name, and default image repo name.
name = "my-app"

# Container image to deploy.
# - If omitted, defaults to `name` (resolved against the ECR URL in
#   .ops/config.yaml as {ecr_url}/{env}/{name}:{tag}).
# - A bare name (no "/") is treated as an ECR image under the configured URL.
# - A path containing "/" is used as-is; if the basename has no ":", the deploy
#   tag is appended automatically.
# image = "my-app"
# image = "123456789.dkr.ecr.us-east-1.amazonaws.com/my-org/my-app"
# image = "my-org/my-app:latest"

# TCP port the container listens on. Required for ALB health checks.
# Omit for background workers that have no HTTP interface.
# port = 8080

# CPU units (1 vCPU = 1024 units). Overrides ecs.defaults.cpu.
# cpu = 512

# Memory in MiB. Overrides ecs.defaults.memory.
# memory = 1024

# Number of running task replicas. Overrides ecs.defaults.replicas.
# replicas = 1
# desired_count = 1  # deprecated alias for replicas

# ECS network mode. Overrides ecs.defaults.network_mode.
# Valid values: awsvpc (recommended), bridge, host, none.
# network_mode = "awsvpc"

# ECS launch type. Overrides ecs.defaults.launch_type.
# Valid values: EC2, FARGATE, EXTERNAL.
# launch_type = "EC2"

# CloudWatch log driver. Overrides ecs.defaults.log_driver.
# Only "awslogs" is currently wired up in the log configuration builder.
# log_driver = "awslogs"

# Override the container entrypoint command.
# command = ["node", "server.js"]

# HTTP path used for ALB and container health checks (requires `port`).
# health_check_path = "/health"

# Override the Secrets Manager secret name used to build ARNs.
# Defaults to `name`. Useful when multiple apps share one secret.
# secrets_name = "shared-backend"

# Override the ECS task execution role ARN for this app.
# Supports {service} and {env} template placeholders.
# Inherits from ecs.execution_role in .ops/config.yaml when omitted.
# execution_role = "arn:aws:iam::123456789:role/{service}-{env}-task-exec"

# Override the ECS task role ARN for this app.
# Supports {service} and {env} template placeholders.
# Inherits from ecs.task_role in .ops/config.yaml when omitted.
# task_role = "arn:aws:iam::123456789:role/{service}-{env}-tasks"

# Run database migrations before updating the service on each deploy.
# database_migrations = false

# Command used when database_migrations = true.
# migration_command = ["bundle", "exec", "rails", "db:migrate"]

# ---------------------------------------------------------------------------
# Subtable sections for [global] — declare these AFTER all scalars above.
# ---------------------------------------------------------------------------

# Static environment variables injected into the container.
# For secrets, use [global.secrets] below.
[global.environment]
# RAILS_ENV = "production"
# NODE_ENV = "production"

# Secrets pulled from AWS Secrets Manager.
# Global secrets are resolved from: {secret_arn_prefix}:{name}/shared
# Per-env secrets are resolved from: {secret_arn_prefix}:{name}/{env}
#
# Use the map form (env var → JSON key in the secret). This is the recommended
# form because it is header-delimited and immune to the TOML subtable scoping
# trap described at the top of this file.
#
# [global.secrets]
# DATABASE_URL = "db_url"
# API_KEY      = "api_key"
#
# Alternatively, use the list form when the env var name matches the JSON key:
#   secrets = ["DATABASE_URL", "REDIS_URL"]   # place this ABOVE [global.environment]

# Secrets fetched from AWS Secrets Manager at image BUILD time, injected via
# Docker BuildKit --mount=type=secret. Same path convention as [global.secrets].
# Use inside a Dockerfile with: RUN --mount=type=secret,id=KEY ...
#
# [global.build_secrets]
# composer_auth = "COMPOSER_AUTH_TOKEN"
#
# List form (secret id == JSON key):
#   build_secrets = ["COMPOSER_AUTH_TOKEN", "NPM_TOKEN"]  # place ABOVE [global.environment]

# Plain key/value pairs passed to docker build as --build-arg KEY=VALUE.
# Values are NOT secret and visible in docker history; use [global.build_secrets]
# for credentials. Env section values override matching global values;
# non-matching global values are still included.
#
# [global.build_args]
# NODE_ENV = "production"
# SENTRY_DSN = "https://example@o0.ingest.sentry.io/0"

# Fine-grained container health check settings (requires health_check_path).
# [global.container_health_check]
# interval    = 30   # seconds between checks
# timeout     = 5    # seconds before a check is considered failed
# retries     = 3    # consecutive failures before the container is unhealthy
# start_period = 60  # grace period after container start before checks count

# EFS volumes declared in [global] are safe for concurrent access from all
# task replicas across availability zones. Host-local types (host, docker)
# must be declared in per-environment sections only.
#
# [[global.volumes]]
# name           = "shared-data"    # unique volume name within this task
# container_path = "/mnt/data"      # absolute path inside the container
# read_only      = false
#
#   [global.volumes.efs]
#   file_system_id      = "fs-0123456789abcdef0"  # REQUIRED
#   root_directory      = "/app-data"              # default: "/" (EFS root)
#   transit_encryption  = "ENABLED"                # "ENABLED" or "DISABLED"
#   access_point_id     = "fsap-0123456789abcdef0" # optional EFS access point
#   iam                 = "ENABLED"                # "ENABLED" or "DISABLED"
#                                                  # requires transit_encryption ENABLED

# ---------------------------------------------------------------------------
# [stage] — overrides applied only when deploying to the stage environment
# ---------------------------------------------------------------------------
[stage]
# replicas = 1
# cpu = 256
# memory = 512

# Per-env environment variables merge with (and can override) [global.environment].
[stage.environment]
# LOG_LEVEL = "debug"

# Per-env secrets are resolved from {secret_arn_prefix}:{name}/stage.
# They merge with global secrets; per-env values take precedence.
#
# [stage.secrets]
# STRIPE_KEY = "stripe_key"
#
# List form: secrets = ["STRIPE_KEY"]   # place ABOVE [stage.environment]

# Per-env build secrets are resolved from {secret_arn_prefix}:{name}/stage.
# They MERGE with global build_secrets: env keys override matching global keys;
# non-matching global keys are still fetched from the shared secret path.
#
# [stage.build_secrets]
# COMPOSER_AUTH_TOKEN = "COMPOSER_AUTH_TOKEN"

# Per-env build_args MERGE with global build_args: env keys override matching
# global keys; non-matching global keys are still included.
#
# [stage.build_args]
# NODE_ENV = "staging"

# Per-env volumes REPLACE global volumes entirely (they do not merge).
# All volume types are allowed here: efs, host, and docker.
#
# EFS volume (safe for multiple replicas across hosts):
# [[stage.volumes]]
# name           = "shared-data"
# container_path = "/mnt/data"
#
#   [stage.volumes.efs]
#   file_system_id     = "fs-0123456789abcdef0"
#   root_directory     = "/app-data/stage"
#   transit_encryption = "ENABLED"
#
# Bind mount — maps a path on the EC2 host into the container.
# Only safe when replicas = 1 or tasks are pinned to one host.
# [[stage.volumes]]
# name           = "tmp-scratch"
# container_path = "/tmp/scratch"
#
#   [stage.volumes.host]
#   source_path = "/scratch"   # omit for a Docker-managed ephemeral directory
#
# Docker-managed volume:
# [[stage.volumes]]
# name           = "cache"
# container_path = "/var/cache"
#
#   [stage.volumes.docker]
#   driver        = "local"
#   scope         = "task"    # "task" (ephemeral) or "shared" (persists on host)
#   autoprovision = true      # only meaningful for scope = "shared"
#   # driver_opts and labels accept arbitrary string key/value maps

# ---------------------------------------------------------------------------
# [production] — overrides applied only when deploying to production
# ---------------------------------------------------------------------------
[production]
# replicas = 3
# cpu = 1024
# memory = 2048

[production.environment]
# LOG_LEVEL = "warn"

# Per-env secrets resolved from {secret_arn_prefix}:{name}/production.
#
# [production.secrets]
# STRIPE_KEY = "stripe_key"

# ---------------------------------------------------------------------------
# [[<section>.scheduled_tasks]] — recurring one-off tasks via EventBridge Scheduler
# ---------------------------------------------------------------------------
# Each entry registers (or updates) one EventBridge Scheduler schedule that
# launches a single ECS task using the same image, secrets, environment vars,
# IAM roles, and network config as the main service — but with the command
# overridden per entry. Terraform must provision the scheduler IAM role and
# schedule group first (see ops-cli docs for the Terraform spec).
#
# Per-environment [[<env>.scheduled_tasks]] arrays REPLACE the global list
# entirely (they do not merge). Re-declare all tasks you want in that env.
#
# NOTE: In TOML, [[global.scheduled_tasks]] must appear AFTER all scalar
# fields and subtable headers in [global] to avoid the subtable scoping trap.
#
# [[global.scheduled_tasks]]
# name               = "daily-cleanup"               # REQUIRED. Unique within this app/env.
#                                                    # Becomes: {app}-{env}-daily-cleanup in EventBridge.
# schedule           = "cron(0 3 * * ? *)"           # REQUIRED. cron() or rate() expression.
# command            = ["node", "scripts/cleanup.js"] # REQUIRED. Container command override.
# timezone           = "America/New_York"             # optional; default "UTC". Applies to cron() only.
# enabled            = true                           # optional; default true. Set false to DISABLE in EventBridge.
# cpu                = 256                            # optional; override task CPU for this schedule only.
# memory             = 512                            # optional; override task memory (MiB) for this schedule only.
# flexible_window_minutes = 15                        # optional; default 0 (exact start). Max minutes to shift start time.
# description        = "Purge temp files nightly"    # optional; stored as a note on the schedule.
#
# [[global.scheduled_tasks]]
# name     = "weekly-report"
# schedule = "cron(0 8 ? * MON *)"
# command  = ["bundle", "exec", "rails", "reports:weekly"]
