version: '3'

vars:
  RENDER: 'python .ops/deploy/render.py'
  CLUSTER: 'lighthouse-platform'

tasks:
  render:
    desc: 'Render task definition JSON (dry run). Usage: task ecs:render APP=interview-service ENV=stage'
    cmds:
      - '{{.RENDER}} --app {{.APP}} --env {{.ENV}}{{if .TAG}} --image-tag {{.TAG}}{{end}} --dry-run'
    requires:
      vars: [APP, ENV]

  deploy:
    desc: 'Register task definition and update ECS service. Usage: task ecs:deploy APP=interview-service ENV=stage'
    silent: true
    vars:
      TAG: '{{.TAG | default "latest"}}'
      APP_CONFIG: '{{.APP_CONFIG | default ""}}'
    cmds:
      - |
        APP_CONFIG_ARG=""
        if [ -n "{{.APP_CONFIG}}" ]; then
          APP_CONFIG_ARG="--app-config {{.APP_CONFIG}}"
        fi
        eval $({{.RENDER}} --app {{.APP}} --env {{.ENV}} --image-tag {{.TAG}} --output /tmp/taskdef-$$.json $APP_CONFIG_ARG)

        echo "--- Rendering task definition: $ECS_FAMILY"
        echo "--- Registering task definition"
        aws ecs register-task-definition \
          --region {{.AWS_REGION}} \
          --cli-input-json "file://$TASKDEF_FILE" \
          --query 'taskDefinition.taskDefinitionArn' \
          --output text

        if [ "${ECS_MIGRATIONS}" = "true" ]; then
          OVERRIDES=$(printf '{"containerOverrides":[{"name":"%s","command":%s}]}' "$ECS_APP_NAME" "$ECS_MIGRATION_COMMAND")
          NET_CONFIG=$(aws ecs describe-services \
            --region {{.AWS_REGION}} \
            --cluster {{.CLUSTER}} \
            --services $ECS_SERVICE \
            --query 'services[0].networkConfiguration' \
            --output json)
          echo "--- Running migration task for $ECS_SERVICE"
          RUN_TASK_OUTPUT=$(aws ecs run-task \
            --region {{.AWS_REGION}} \
            --cluster {{.CLUSTER}} \
            --task-definition $ECS_FAMILY \
            --capacity-provider-strategy "capacityProvider=ec2-lighthouse-platform-{{.ENV}},weight=100,base=1" \
            --network-configuration "$NET_CONFIG" \
            --overrides "$OVERRIDES" \
            --output json)

          TASK_ARN=$(echo "$RUN_TASK_OUTPUT" | python3 -c "import sys,json; t=json.load(sys.stdin)['tasks']; print(t[0]['taskArn'] if t else '')" 2>/dev/null)
          FAILURES=$(echo "$RUN_TASK_OUTPUT" | python3 -c "import sys,json; f=json.load(sys.stdin)['failures']; [print(x.get('reason','unknown')) for x in f]" 2>/dev/null)

          if [ -z "$TASK_ARN" ]; then
            echo "Error: failed to start migration task." >&2
            [ -n "$FAILURES" ] && echo "$FAILURES" >&2
            exit 1
          fi

          echo "--- Migration task started: $TASK_ARN"
          echo "--- Waiting for migration to complete..."
          aws ecs wait tasks-stopped \
            --region {{.AWS_REGION}} \
            --cluster {{.CLUSTER}} \
            --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --region {{.AWS_REGION}} \
            --cluster {{.CLUSTER}} \
            --tasks "$TASK_ARN" \
            --query "tasks[0].containers[?name=='${ECS_APP_NAME}'].exitCode | [0]" \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Error: migration task failed with exit code $EXIT_CODE" >&2
            exit 1
          fi

          TASK_ID=$(echo "$TASK_ARN" | awk -F/ '{print $NF}')
          LOG_STREAM="${ECS_APP_NAME}/${ECS_APP_NAME}/${TASK_ID}"
          echo "--- Migration logs:"
          aws logs tail "$LOG_GROUP" \
            --region {{.AWS_REGION}} \
            --log-stream-names "$LOG_STREAM" \
            --since 1h \
            2>/dev/null || echo "(no logs available)"
          echo "--- Migration complete."
        fi

        echo "--- Updating service: $ECS_SERVICE"
        aws ecs update-service \
          --region {{.AWS_REGION}} \
          --cluster {{.CLUSTER}} \
          --service $ECS_SERVICE \
          --task-definition $ECS_FAMILY \
          --desired-count $ECS_DESIRED_COUNT \
          --force-new-deployment \
          --query 'service.taskDefinition' \
          --output text

        echo "--- Deploy initiated. Run 'task ecs:wait APP={{.APP}} ENV={{.ENV}}' to wait for stability."
      - task: cleanup
        vars:
          APP: '{{.APP}}'
          ENV: '{{.ENV}}'
          APP_CONFIG: '{{.APP_CONFIG}}'
    requires:
      vars: [APP, ENV]

  db-migrate:
    desc: 'Run database migration as a standalone ECS task. Usage: task ecs:db-migrate APP=qa-metrics-api ENV=stage'
    silent: true
    vars:
      APP_CONFIG: '{{.APP_CONFIG | default ""}}'
    cmds:
      - |
        APP_CONFIG_ARG=""
        if [ -n "{{.APP_CONFIG}}" ]; then
          APP_CONFIG_ARG="--app-config {{.APP_CONFIG}}"
        fi
        eval $({{.RENDER}} --app {{.APP}} --env {{.ENV}} --metadata $APP_CONFIG_ARG)

        if [ "${ECS_MIGRATIONS}" != "true" ]; then
          echo "--- No migrations configured for $ECS_SERVICE, skipping."
          exit 0
        fi

        OVERRIDES=$(printf '{"containerOverrides":[{"name":"%s","command":%s}]}' "$ECS_APP_NAME" "$ECS_MIGRATION_COMMAND")
        NET_CONFIG=$(aws ecs describe-services \
          --region {{.AWS_REGION}} \
          --cluster {{.CLUSTER}} \
          --services $ECS_SERVICE \
          --query 'services[0].networkConfiguration' \
          --output json)
        echo "--- Running migration task for $ECS_SERVICE ($ECS_FAMILY)"
        TASK_ARN=$(aws ecs run-task \
          --region {{.AWS_REGION}} \
          --cluster {{.CLUSTER}} \
          --task-definition $ECS_FAMILY \
          --capacity-provider-strategy "capacityProvider=ec2-lighthouse-platform-{{.ENV}},weight=100,base=1" \
          --network-configuration "$NET_CONFIG" \
          --overrides "$OVERRIDES" \
          --query 'tasks[0].taskArn' \
          --output text)

        if [ -z "$TASK_ARN" ] || [ "$TASK_ARN" = "None" ]; then
          echo "Error: failed to start migration task." >&2
          exit 1
        fi

        echo "--- Migration task started: $TASK_ARN"
        echo "--- Waiting for migration to complete..."
        aws ecs wait tasks-stopped \
          --region {{.AWS_REGION}} \
          --cluster {{.CLUSTER}} \
          --tasks "$TASK_ARN"

        EXIT_CODE=$(aws ecs describe-tasks \
          --region {{.AWS_REGION}} \
          --cluster {{.CLUSTER}} \
          --tasks "$TASK_ARN" \
          --query "tasks[0].containers[?name=='${ECS_APP_NAME}'].exitCode | [0]" \
          --output text)

        if [ "$EXIT_CODE" != "0" ]; then
          echo "Error: migration task failed with exit code $EXIT_CODE" >&2
          exit 1
        fi

        TASK_ID=$(echo "$TASK_ARN" | awk -F/ '{print $NF}')
        LOG_STREAM="${ECS_APP_NAME}/${ECS_APP_NAME}/${TASK_ID}"
        echo "--- Migration logs:"
        aws logs tail "$LOG_GROUP" \
          --region {{.AWS_REGION}} \
          --log-stream-names "$LOG_STREAM" \
          --since 1h \
          2>/dev/null || echo "(no logs available)"
        echo "--- Migration complete."
    requires:
      vars: [APP, ENV]

  cleanup:
    desc: 'Remove old task definition revisions, keeping the latest N. Usage: task ecs:cleanup APP=interview-service ENV=stage'
    silent: true
    vars:
      KEEP: '{{.KEEP | default "5"}}'
      APP_CONFIG: '{{.APP_CONFIG | default ""}}'
    cmds:
      - |
        APP_CONFIG_ARG=""
        if [ -n "{{.APP_CONFIG}}" ]; then
          APP_CONFIG_ARG="--app-config {{.APP_CONFIG}}"
        fi
        eval $({{.RENDER}} --app {{.APP}} --env {{.ENV}} --metadata $APP_CONFIG_ARG)

        ARNS=$(aws ecs list-task-definitions \
          --region {{.AWS_REGION}} \
          --family-prefix $ECS_FAMILY \
          --status ACTIVE \
          --sort ASC \
          --query 'taskDefinitionArns' \
          --output json)

        TOTAL=$(echo "$ARNS" | jq 'length')

        if [ "$TOTAL" -le {{.KEEP}} ]; then
          echo "Only $TOTAL revision(s) for $ECS_FAMILY, nothing to clean up."
          exit 0
        fi

        DELETE_COUNT=$((TOTAL - {{.KEEP}}))
        echo "--- Cleaning up $DELETE_COUNT old revision(s) for $ECS_FAMILY (keeping {{.KEEP}})"

        TO_DELETE=$(echo "$ARNS" | jq -r ".[:$DELETE_COUNT][]")

        for ARN in $TO_DELETE; do
          echo "Deregistering: $ARN"
          aws ecs deregister-task-definition \
            --region {{.AWS_REGION}} \
            --task-definition "$ARN" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text
        done

        # delete-task-definitions accepts up to 10 at a time
        echo "$TO_DELETE" | xargs -n 10 | while read -r BATCH; do
          echo "Deleting batch: $BATCH"
          aws ecs delete-task-definitions \
            --region {{.AWS_REGION}} \
            --task-definitions $BATCH \
            --query 'taskDefinitions[].taskDefinitionArn' \
            --output text
        done

        echo "--- Cleanup complete."
    requires:
      vars: [APP, ENV]

  rollback:
    desc: 'Roll back to the previous task definition revision. Usage: task ecs:rollback APP=interview-service ENV=stage'
    silent: true
    cmds:
      - |
        eval $({{.RENDER}} --app {{.APP}} --env {{.ENV}} --metadata)

        CURRENT=$(aws ecs describe-services \
          --region {{.AWS_REGION}} \
          --cluster {{.CLUSTER}} \
          --services $ECS_SERVICE \
          --query 'services[0].taskDefinition' \
          --output text)

        REVISION=$(echo "$CURRENT" | grep -oE '[0-9]+$')
        PREVIOUS=$((REVISION - 1))

        if [ "$PREVIOUS" -lt 1 ]; then
          echo "Error: No previous revision to roll back to." >&2
          exit 1
        fi

        echo "Rolling back $ECS_SERVICE from revision $REVISION to $PREVIOUS"
        aws ecs update-service \
          --region {{.AWS_REGION}} \
          --cluster {{.CLUSTER}} \
          --service $ECS_SERVICE \
          --task-definition $ECS_FAMILY:$PREVIOUS \
          --force-new-deployment \
          --query 'service.taskDefinition' \
          --output text
    requires:
      vars: [APP, ENV]

  status:
    desc: 'Show current deployment status. Usage: task ecs:status APP=interview-service ENV=stage'
    cmds:
      - |
        eval $({{.RENDER}} --app {{.APP}} --env {{.ENV}} --metadata)
        aws ecs describe-services \
          --region {{.AWS_REGION}} \
          --cluster {{.CLUSTER}} \
          --services $ECS_SERVICE \
          --query 'services[0].{Status:status,Running:runningCount,Desired:desiredCount,TaskDef:taskDefinition,LastEvent:events[0].message}' \
          --output table
    requires:
      vars: [APP, ENV]

  wait:
    desc: 'Wait for service to reach steady state. Usage: task ecs:wait APP=interview-service ENV=stage'
    vars:
      APP_CONFIG: '{{.APP_CONFIG | default ""}}'
    cmds:
      - |
        APP_CONFIG_ARG=""
        if [ -n "{{.APP_CONFIG}}" ]; then
          APP_CONFIG_ARG="--app-config {{.APP_CONFIG}}"
        fi
        eval $({{.RENDER}} --app {{.APP}} --env {{.ENV}} --metadata $APP_CONFIG_ARG)
        echo "Waiting for $ECS_SERVICE to stabilize..."
        aws ecs wait services-stable \
          --region {{.AWS_REGION}} \
          --cluster {{.CLUSTER}} \
          --services $ECS_SERVICE
        echo "Service $ECS_SERVICE is stable."
    requires:
      vars: [APP, ENV]

  migrate:
    desc: 'Run a one-off Alembic migration task via ECS run-task. Usage: task ecs:migrate ENV=stage'
    silent: true
    cmds:
      - |
        eval $({{.RENDER}} --app internal-jobs --app-config apps/internal-jobs/deploy/flows.toml --env {{.ENV}} --metadata)

        NET_CONFIG=$(aws ecs describe-services \
          --region {{.AWS_REGION}} \
          --cluster {{.CLUSTER}} \
          --services $ECS_SERVICE \
          --query 'services[0].networkConfiguration' \
          --output json)

        TASK_ARN=$(aws ecs run-task \
          --region {{.AWS_REGION}} \
          --cluster {{.CLUSTER}} \
          --task-definition $ECS_FAMILY \
          --launch-type EC2 \
          --network-configuration "$NET_CONFIG" \
          --overrides '{"containerOverrides":[{"name":"internal-jobs-flows","command":["alembic","upgrade","head"]}]}' \
          --query 'tasks[0].taskArn' \
          --output text)

        echo "--- Migration task started: $TASK_ARN"
        echo "--- Waiting for migration to complete..."
        aws ecs wait tasks-stopped \
          --region {{.AWS_REGION}} \
          --cluster {{.CLUSTER}} \
          --tasks "$TASK_ARN"

        EXIT_CODE=$(aws ecs describe-tasks \
          --region {{.AWS_REGION}} \
          --cluster {{.CLUSTER}} \
          --tasks "$TASK_ARN" \
          --query 'tasks[0].containers[0].exitCode' \
          --output text)

        if [ "$EXIT_CODE" != "0" ]; then
          echo "Error: Migration task failed with exit code $EXIT_CODE" >&2
          exit 1
        fi
        echo "--- Migration complete."
    requires:
      vars: [ENV]

  logs:
    desc: 'Tail recent logs for a service. Usage: task ecs:logs APP=interview-service ENV=stage'
    cmds:
      - aws logs tail
        /ecs/{{.CLUSTER}}/{{.ENV}}/{{.APP}}
        --region {{.AWS_REGION}}
        --since 10m
        --follow
    requires:
      vars: [APP, ENV]
