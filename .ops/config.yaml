---
env: stage

# Can be one of: [ aws, azure, gcp ]
cloud_provider: "azure"

# Should match the name of the cluster in the selected Cloud Provider
cluster_name: "gbh-stage"

deployment:
  # Can be one of: [ ansible, werf ]
  provider: werf

container_registry:
  # Can be one of: [ acr, ecr, gcr ]
  type: ecr
  url: there
