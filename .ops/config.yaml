---
# Company & project information
company: gbh
project: ops

# Default target environment when --env is not provided.
env: stage

# Tie-breakers for inference. Both are optional and only required when more
# than one cloud or deployment block is defined below. Can also be supplied
# via the persistent flags --provider / --deployment.
# provider: aws
# deployment: werf

# Mono- vs single-repo layout. Controls how app config file paths resolve:
#   "mono"   (default): apps/{app}/deploy/config.<ext>
#   "single":           deploy/config.<ext>
repo_mode: "mono"

# Root directory containing per-app subdirectories (mono-repo only).
# Defaults to "apps".
apps_dir: "apps"

# Configuration for git-based commands & related automations
git:
  default_branch: main

# Configuration for Kubernetes clusters
k8s:
  # Should match the name of the cluster in the selected Cloud Provider.
  # It's a prefix because Ops assumes the suffix is the environment name,
  # e.g. `gbh-stage` for the stage environment.
  cluster_name_prefix: "gbh-"

# AWS provider block. Its presence makes "aws" the active cloud provider
# (and the registry is implicitly ECR). All cross-cutting AWS values like
# the registry URL and the secrets manager / IAM ARN prefixes are derived
# from `account_id` and `region` below — no need to repeat them.
aws:
  profile: "gbh"  # optional; omit when using env vars, IAM role, or instance profile
  account_id: "091791791455"
  region: "us-east-1"

# Werf deployment provider block. Its presence makes "werf" the active
# deployment provider.
werf:
  # Applications/services managed by Werf (must match werf.yaml images)
  services: ["api", "web"]

  # Additional files passed to Werf via `--values` regardless of environment.
  values_files: [".helm/custom-env-vars.yaml"]

  # Additional paths added to Werf commands with `--values` and
  # `--secret-values` regardless of environment.
  values: [".helm/values", ".helm/extra-values"]
  secrets: [".helm/secrets"]

# Only required when the active deployment provider is ecs.
# Per-app deployment config lives in deploy/config.toml (mono-repo: apps/{app}/deploy/config.toml).
# See deploy/config.toml in this repo for a fully-annotated example of all supported directives.
ecs:
  cluster: "lighthouse-platform"
  secret_arn_prefix: "arn:aws:secretsmanager:us-east-1:091791791455:secret"
  execution_role: "arn:aws:iam::091791791455:role/{service}-{env}-task-exec"
  task_role: "arn:aws:iam::091791791455:role/{service}-{env}-tasks"
  capacity_provider: "ec2-lighthouse-platform-{env}"
  defaults:
    cpu: 256
    memory: 512
    replicas: 1
    network_mode: "awsvpc"
    launch_type: "EC2"
    log_driver: "awslogs"

  # Number of task definition revisions to retain per family during automatic
  # cleanup after `ops ecs deploy` and as the default for `ops ecs cleanup`.
  # Applies to both the service family ("{app}-{env}") and the scheduled
  # family ("{app}-{env}-scheduled"). Defaults to 5 when omitted.
  # cleanup_keep: 5

  # Required when any app declares scheduled_tasks in its deploy/config.toml.
  # The IAM role and schedule group are provisioned by the aws-ecs Terraform
  # module (modules/aws-ecs/scheduler.tf). Wire the Terraform outputs here:
  #   module.ecs.scheduler_role_arn   → role_arn
  #   module.ecs.scheduler_group_name → group_name
  # Supports {env} and {cluster} template placeholders in both values.
  # scheduler:
  #   role_arn:   "arn:aws:iam::091791791455:role/ecs-scheduler-{env}"
  #   group_name: "{cluster}-{env}"

# # Configuration of the Cloud provider Microsoft Azure
