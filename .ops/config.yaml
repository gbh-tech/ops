---
env: stage

cloud:
  # Can be one of: [ aws, azure, gcp ]
  provider: "aws"

# Configuration for Kubernetes clusters
k8s:
  # Should match the name of the cluster in the selected Cloud Provider
  # It's a prefix because Ops assumes the suffix is the environment name.
  # e.g. `gbh-stage` for the stage environment.
  # e.g. `gbh-production` for the production environment.
  cluster_name_prefix: "gbh-"

deployment:
  # Can be one of: [ ansible, werf ]
  provider: werf

registry:
  # Can be one of: [ acr, ecr, gcr ]
  type: ecr
  url: 091791791455.dkr.ecr.us-east-1.amazonaws.com

# Only used if deployment.provider is werf
werf:
  # Applications/services managed by Werf (must match werf.yaml images)
  services: ["api", "web"]
  # Additional files to be added to Werf commands with `--values`
  # and `--secret-values` independently of the environment (applies to all templates).
  values_files: [".helm/custom-env-vars.yaml"]
  secrets_files: [".helm/custom-secret-vars.yaml"]
  # Additional paths where files will be added to Werf commands with `--values`
  # and `--secret-values` independently of the environment (applies to all templates).
  values: [".helm/values", ".helm/extra-values"]
  secrets: [".helm/secrets"]

# Configuration for git-based commands & related automations
git:
  default_branch: main

# Configuration of the Cloud provider AWS
aws:
  profile: "gbh"
  account_id: "091791791455"
  region: "us-east-1"

# Configuration of the Cloud provider Microsoft Azure
azure:
  location: "East US"
  resource_group: "gbh-rg"
